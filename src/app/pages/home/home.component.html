<div class="home-container">
  <div class="background-elements">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
  </div>

  <header class="header">
    <div class="logo">
      <div class="logo-icon"></div>
      Plano<span class="highlight">Gram3D</span>
    </div>
    <nav class="navigation">
    </nav>
    <div class="header-actions">
    </div>
  </header>

  <main class="main-content">
    <div class="hero-section">
      <div class="hero-text-content">
        <h1 class="hero-title">
          Design your perfect space with
          <span class="gradient-text">precision</span>
        </h1>
        <p class="hero-subtitle">
          Create, visualize, and optimize intelligent planograms in immersive 3D and precise 2D. Elevate your retail arrangement strategies with our cutting-edge tools.
        </p>
        
        <div class="action-buttons">
          <button class="btn btn-primary create-btn" routerLink="/planogram">
            <span class="btn-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            </span>
            Create Planogram
          </button>
        </div>

        <div class="stats-container">
          <div class="stat-item">
            <div class="stat-value">10k+</div>
            <div class="stat-label">Active Users</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">3D/2D</div>
            <div class="stat-label">Switch Modes</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">99%</div>
            <div class="stat-label">Accuracy</div>
          </div>
        </div>
      </div>

      <div class="hero-visual-content">
        <div class="visual-stack">
          <!-- 2D View Representation -->
          <div class="visual-card view-2d">
            <div class="card-header">
              <span class="card-title">2D Schematic View</span>
              <div class="card-controls">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
              </div>
            </div>
            <div class="grid-representation">
              <div class="shelf">
                <div class="product p-red"></div>
                <div class="product p-blue"></div>
                <div class="product p-green"></div>
                <div class="product p-yellow"></div>
              </div>
              <div class="shelf">
                <div class="product p-blue wide"></div>
                <div class="product p-red"></div>
                <div class="product p-red"></div>
              </div>
              <div class="shelf">
                <div class="product p-green"></div>
                <div class="product p-yellow wide"></div>
                <div class="product p-blue"></div>
              </div>
            </div>
          </div>

          <!-- 3D View Representation -->
          <div class="visual-card view-3d">
            <div class="card-header">
              <span class="card-title">3D Render View</span>
              <div class="card-controls">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
              </div>
            </div>
            <div class="isometric-representation">
              <div class="cube cube-1">
                <div class="face top"></div>
                <div class="face left"></div>
                <div class="face right"></div>
              </div>
              <div class="cube cube-2">
                <div class="face top"></div>
                <div class="face left"></div>
                <div class="face right"></div>
              </div>
              <div class="cube cube-3">
                <div class="face top"></div>
                <div class="face left"></div>
                <div class="face right"></div>
              </div>
                <div class="cube cube-4">
                <div class="face top"></div>
                <div class="face left"></div>
                <div class="face right"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
