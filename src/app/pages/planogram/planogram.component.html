<div class="planogram-layout">
  <header class="workspace-header">
    <div class="header-left">
      <a routerLink="/" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Back to Home
      </a>
      <h2 class="document-title">Untitled Planogram</h2>
    </div>
    <div class="header-right">
      <button class="btn-action">Save</button>
      <button class="btn-action export">Export</button>
    </div>
  </header>
  
  <div class="workspace-content">
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3>Scene Hierarchy</h3>
        <app-scene-hierarchy
          [objects]="objectDataList"
          [selectedId]="selectedObject?.id ?? null"
          (objectSelected)="selectObjectById($event)"
          (visibilityToggled)="toggleVisibility($event.event, $event.id)">
        </app-scene-hierarchy>
      </div>
      
      <div class="sidebar-section">
        <h3>Library</h3>
        <p class="sidebar-help">Select objects to add</p>
        
        <div class="draggable-item" draggable="true" (dragstart)="onDragStart($event, 'cube')" (dragend)="onDragEnd($event)">
          <div class="item-icon cube-icon"></div>
          <span>Standard Cube</span>
        </div>
        <div class="draggable-item" draggable="true" (dragstart)="onDragStart($event, 'shelf')" (dragend)="onDragEnd($event)">
          <div class="item-icon prism-icon"></div>
          <span>Rectangle Shelf</span>
        </div>
        <div class="draggable-item" draggable="true" (dragstart)="onDragStart($event, 'cupboard')" (dragend)="onDragEnd($event)">
          <div class="item-icon door-icon"></div>
          <span>Open Cupboard</span>
        </div>
        <div class="draggable-item" draggable="true" (dragstart)="onDragStart($event, 'chest')" (dragend)="onDragEnd($event)">
          <div class="item-icon chest-icon"></div>
          <span>Storage Chest</span>
        </div>
      </div>
    </aside>

    <main class="canvas-area" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)">
      <!-- Overlay UI -->
      <div class="canvas-overlay top-right">
        <div class="settings-row">
          <button class="toggle-btn" (click)="toggleTransformSpace()" title="Toggle Transform Space (Local/World)">
            Space: <strong>{{ transformSpace | titlecase }}</strong>
          </button>

          <button class="toggle-btn" (click)="toggleSnap()" title="Toggle transform snap">
            Snap: <strong>{{ snapEnabled ? 'On' : 'Off' }}</strong>
          </button>
        </div>

        <div class="transform-toolbar">
          <button class="tool-btn" [class.active]="currentTransformMode === 'select'" (click)="setTransformMode('select')" title="Select (Esc)">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 3 7.07 16.97 2.51-7.39 6.97-2.51L3 3z"/><path d="m13 13 6 6"/></svg>
          </button>
          <button class="tool-btn" [class.active]="currentTransformMode === 'translate'" (click)="setTransformMode('translate')" title="Move (W)">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
          </button>
          <button class="tool-btn" [class.active]="currentTransformMode === 'rotate'" (click)="setTransformMode('rotate')" title="Rotate (R)">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
          </button>
          <button class="tool-btn" [class.active]="currentTransformMode === 'scale'" (click)="setTransformMode('scale')" title="Scale (E)">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7V3h-4"/><path d="M3 17v4h4"/><path d="m21 3-5 5"/><path d="m8 16-5 5"/><path d="M21 17v4h-4"/><path d="M3 7V3h4"/><path d="m21 21-5-5"/><path d="m8 8-5-5"/></svg>
          </button>
        </div>
      </div>
      
      <!-- ThreeJS renders inside this container -->
      <div #canvasContainer class="webgl-container"></div>
    </main>
    
    <app-properties-panel
      [selectedObject]="selectedObject"
      [transform]="transform"
      (transformUpdated)="applyTransformChanges()">
    </app-properties-panel>
  </div>

  <!-- Context Menu Overlay -->
  <div class="context-menu" 
       *ngIf="contextMenu.visible" 
       [style.left.px]="contextMenu.x" 
       [style.top.px]="contextMenu.y">
    <ul>
      <li *ngIf="contextMenu.targetType === 'cupboard'" (click)="distributeShelves()">
        Distribute Shelves
      </li>
      <li (click)="deleteObject()" class="text-danger">
        Delete
      </li>
      <li *ngIf="contextMenu.targetType === 'cupboard'" (click)="duplicateObject()">
  Duplicate Door
</li>
    </ul>
  </div>
</div>
